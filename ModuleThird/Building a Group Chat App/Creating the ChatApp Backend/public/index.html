<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp Backend Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f2f2f2;
        color: #333;
      }
      .container {
        max-width: 760px;
        margin: 32px auto;
        padding: 24px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      .chat-form {
        display: grid;
        gap: 12px;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
      }
      button {
        padding: 12px 18px;
        background: #3b82f6;
        border: none;
        color: white;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }
      button:hover {
        background: #2563eb;
      }
      .message-list {
        margin-top: 24px;
      }
      .message-item {
        border: 1px solid #e5e7eb;
        padding: 14px;
        border-radius: 10px;
        margin-bottom: 12px;
        background: #fafafa;
      }
      .meta {
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 8px;
      }
      .empty {
        color: #6b7280;
        padding: 16px;
        background: #f9fafb;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>ChatApp Demo</h1>
      <p>Enter your user ID and message. Every message is sent to the backend and stored in MongoDB.</p>

      <div id="root"></div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>
    <script type="text/babel" src="app.js"></script>
  </body>
</html>
