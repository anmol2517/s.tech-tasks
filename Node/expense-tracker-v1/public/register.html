<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ExpenseTracker</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>ExpenseTracker</h1>
      <p class="subtitle">Create your account</p>
      <form id="register-form" class="form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="••••••••" required>
        </div>
        <div id="error-message" class="error-message"></div>
        <button type="submit" class="btn btn-primary full-width">Register</button>
      </form>
      <p class="auth-link">Already have an account? <a href="/login.html">Login</a></p>
    </div>
  </div>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      const err = document.getElementById('error-message');
      if (password !== confirm) { err.textContent = 'Passwords do not match'; return; }
      try {
        const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, password }) });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error; return; }
        alert('Registered! Please login.');
        window.location.href = '/login.html';
      } catch { err.textContent = 'An error occurred'; }
    });
  </script>
</body>
</html>
