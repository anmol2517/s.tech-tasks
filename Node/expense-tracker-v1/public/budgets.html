<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budgets - Expense Tracker</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="app-page">
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Expense Tracker</h2>
        <button class="menu-toggle" id="menuToggle">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-link" data-page="dashboard">
          <span class="nav-icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="/expenses.html" class="nav-link" data-page="expenses">
          <span class="nav-icon">💳</span>
          <span>Expenses</span>
        </a>
        <a href="/categories.html" class="nav-link" data-page="categories">
          <span class="nav-icon">🏷️</span>
          <span>Categories</span>
        </a>
        <a href="/budgets.html" class="nav-link active" data-page="budgets">
          <span class="nav-icon">💰</span>
          <span>Budgets</span>
        </a>
        <a href="/reports.html" class="nav-link" data-page="reports">
          <span class="nav-icon">📈</span>
          <span>Reports</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <p class="user-name" id="userName">User</p>
            <p class="user-email" id="userEmail">email@example.com</p>
          </div>
        </div>
        <button class="btn btn-secondary" id="logoutBtn">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="dashboard-header">
        <h1>Budget Tracker</h1>
        <div class="dashboard-actions">
          <button class="btn btn-primary" id="addBudgetBtn">+ Set Budget</button>
        </div>
      </div>

      <!-- Month/Year Selector -->
      <div class="month-selector">
        <button class="btn btn-secondary" id="prevMonthBtn">← Previous</button>
        <span id="currentMonthDisplay"></span>
        <button class="btn btn-secondary" id="nextMonthBtn">Next →</button>
      </div>

      <!-- Budgets Grid -->
      <div class="section">
        <div class="budgets-grid" id="budgetsGrid">
          <p class="text-center">Loading budgets...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Budget Modal -->
  <div class="modal" id="budgetModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="budgetModalTitle">Set Budget</h2>
        <button class="modal-close" id="closeBudgetModal">&times;</button>
      </div>
      <form id="budgetForm" class="form">
        <div class="form-group">
          <label for="budgetCategory">Category</label>
          <select id="budgetCategory" required>
            <option value="">Select a category</option>
          </select>
        </div>
        <div class="form-group">
          <label for="budgetLimit">Monthly Limit</label>
          <input type="number" id="budgetLimit" step="0.01" min="0" placeholder="0.00" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelBudgetBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Budget</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/budgets.js"></script>
</body>
</html>
