<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - ExpenseTracker</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="app-page">
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>ExpenseTracker</h2>
        <button class="menu-toggle" id="menuToggle">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-link active">
          <span class="nav-icon">📊</span><span>Dashboard</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info-sidebar">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <p class="user-name" id="userName">User</p>
            <p class="user-email" id="userEmail">email@example.com</p>
          </div>
        </div>
        <button class="btn btn-secondary" id="logoutBtn">Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Dashboard</h1>
        <button class="btn btn-primary" id="toggle-form-btn">+ Add Expense</button>
      </div>

      <div id="form-container" class="form-container hidden">
        <div class="card">
          <h3 id="form-title">Add New Expense</h3>
          <div class="form">
            <div class="form-row">
              <div class="form-group">
                <label>Description</label>
                <input type="text" id="description" placeholder="What did you spend on?">
              </div>
              <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" id="amount" step="0.01" placeholder="0.00">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Category</label>
                <select id="category">
                  <option value="">Select Category</option>
                  <option value="Food">Food</option>
                  <option value="Transport">Transport</option>
                  <option value="Entertainment">Entertainment</option>
                  <option value="Shopping">Shopping</option>
                  <option value="Bills">Bills</option>
                  <option value="Health">Health</option>
                  <option value="Education">Education</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="form-group">
                <label>Date</label>
                <input type="date" id="date">
              </div>
            </div>
            <div id="form-error" class="error-message"></div>
            <div class="form-actions">
              <button id="submit-btn" class="btn btn-primary">Add Expense</button>
              <button id="cancel-btn" class="btn btn-outline">Cancel</button>
            </div>
          </div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <p class="stat-label">Total Spent</p>
          <p class="stat-value">₹<span id="total-spent">0.00</span></p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Avg per Transaction</p>
          <p class="stat-value">₹<span id="avg-amount">0.00</span></p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Total Transactions</p>
          <p class="stat-value"><span id="total-count">0</span></p>
        </div>
      </div>

      <div id="charts-container" class="charts-grid hidden">
        <div class="card">
          <h3>Spending by Category</h3>
          <canvas id="category-chart"></canvas>
        </div>
        <div class="card">
          <h3>Spending Trend</h3>
          <canvas id="trend-chart"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="list-header">
          <h3>Transaction History</h3>
          <div class="search-filter">
            <input type="text" id="search-input" placeholder="Search...">
            <select id="category-filter">
              <option value="all">All Categories</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Shopping">Shopping</option>
              <option value="Bills">Bills</option>
              <option value="Health">Health</option>
              <option value="Education">Education</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div id="expenses-list" class="expenses-list"></div>
      </div>
    </main>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
